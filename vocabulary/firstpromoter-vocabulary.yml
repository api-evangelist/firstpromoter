vocabulary:
  - term: promoter
    definition: An affiliate or referral partner who promotes a product or service in exchange for commissions or rewards.
    type: noun
    domain: Affiliate Marketing
  - term: referral
    definition: A lead or customer who was referred by a promoter using a referral link or promo code.
    type: noun
    domain: Affiliate Marketing
  - term: commission
    definition: A monetary or non-monetary reward earned by a promoter when a referral converts into a paying customer.
    type: noun
    domain: Commission Management
  - term: payout
    definition: The transfer of earned commissions to a promoter via a supported payment method.
    type: noun
    domain: Reward Distribution
  - term: campaign
    definition: A promotional program with defined commission rules, eligibility criteria, and reward structures that promoters can join.
    type: noun
    domain: Affiliate Marketing
  - term: promoter_campaign
    definition: The association between a promoter and a campaign, including their performance metrics and reward configuration.
    type: noun
    domain: Affiliate Marketing
  - term: referral_link
    definition: A unique tracking URL assigned to a promoter that attributes clicks and conversions back to them.
    type: noun
    domain: Tracking
  - term: promo_code
    definition: A unique discount or referral code assigned to a promoter that customers can use during checkout.
    type: noun
    domain: Tracking
  - term: lead
    definition: A potential customer who has clicked a referral link or signed up but has not yet made a purchase.
    type: noun
    domain: Referral Tracking
  - term: reward
    definition: The incentive given to a promoter for generating a conversion, which can be monetary or non-monetary.
    type: noun
    domain: Reward Distribution
  - term: batch_process
    definition: An asynchronous server-side operation that handles bulk actions on multiple records simultaneously.
    type: noun
    domain: Operations
  - term: webhook
    definition: An HTTP callback sent by FirstPromoter to a subscriber URL when specific events occur in the platform.
    type: noun
    domain: Events
  - term: webhook_subscription
    definition: A configuration that maps a webhook endpoint URL to one or more event types to receive notifications.
    type: noun
    domain: Events
  - term: webhook_delivery
    definition: A record of an attempt to deliver a webhook event to a subscriber, including status and response details.
    type: noun
    domain: Events
  - term: mrr
    definition: Monthly Recurring Revenue attributed to a referral, used for calculating recurring commissions.
    type: noun
    domain: Finance
  - term: ref_id
    definition: An external identifier used to match a referral or promoter to a record in the merchant's system.
    type: noun
    domain: Integration
  - term: tracking_id
    definition: A unique identifier generated by the fpr.js script to track visitor sessions and attribute conversions.
    type: noun
    domain: Tracking
  - term: click
    definition: A visit to a referral link recorded by the FirstPromoter tracking system.
    type: noun
    domain: Tracking
  - term: sale
    definition: A successful payment event tracked via the FirstPromoter API that triggers commission generation.
    type: noun
    domain: Finance
  - term: cancellation
    definition: An event indicating a referred customer has cancelled their subscription, potentially affecting commissions.
    type: noun
    domain: Finance
  - term: refund
    definition: A negative sale event that generates a negative commission to reverse previously earned rewards.
    type: noun
    domain: Finance
