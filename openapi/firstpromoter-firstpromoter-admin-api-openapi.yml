        split_percentage_value:
          type: string
          nullable: true
          example: null
        visitor_sub_id:
          type: string
          nullable: true
          example: null
    WebhookSubscription:
      type: object
      properties:
        id:
          type: integer
          description: Unique ID of the subscription.
        url:
          type: string
          format: uri
          description: The endpoint URL that receives webhook payloads.
        description:
          type: string
          nullable: true
          description: Optional human-readable label for this subscription.
        event_types:
          type: array
          items:
            type: string
          description: Event type strings this subscription is listening to.
          example:
          - referral.created
          - commission.created
        campaign_ids:
          type: array
          items:
            type: integer
          description: Campaign IDs that trigger this subscription. `[1]` means all
            campaigns.
          example:
          - 1
        active:
          type: boolean
          description: Whether delivery is enabled. Set to `false` to pause without
            deleting.
        timeout:
          type: integer
          description: 'Request timeout in seconds. Must be between 1 and 120. Default:
            30.'
          minimum: 1
          maximum: 120
        max_retries:
          type: integer
          description: 'Number of times a failed delivery is automatically retried.
            Must be between 0 and 10. Default: 3.'
          minimum: 0
          maximum: 10
        headers:
          type: object
          description: Custom HTTP headers sent with every delivery request.
          additionalProperties:
            type: string
          example:
            Authorization: Bearer my-token
        basic_auth_user:
          type: string
          nullable: true
          description: HTTP Basic Auth username sent with every delivery. `null` if
            not configured.
        basic_auth_enabled:
          type: boolean
          description: '`true` when both a Basic Auth username and password are set
            on this subscription.'
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when the subscription was created.
        updated_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of the last update.
    WebhookSubscriptionInput:
      type: object
      properties:
        url:
          type: string
          format: uri
          description: The HTTPS URL that will receive webhook payloads. Required
            when creating.
        event_types:
          type: array
          items:
            type: string
          description: One or more event type strings to subscribe to. Required when
            creating. Use the `event_types` endpoint to list all supported values.
          example:
          - referral.created
          - commission.created
        active:
          type: boolean
          description: Enable or pause delivery. Defaults to `true`.
        timeout:
          type: integer
          description: Request timeout in seconds. Must be 1–120. Defaults to 30.
          minimum: 1
          maximum: 120
        max_retries:
          type: integer
          description: Automatic retry count for failed deliveries. Must be 0–10.
            Defaults to 3.
          minimum: 0
          maximum: 10
        description:
          type: string
          description: Optional human-readable label.
        campaign_ids:
          type: array
          items:
            type: integer
          description: Restrict this subscription to events from specific campaigns.
            Pass `[1]` (the default) to receive events from all campaigns.
          example:
          - 1
        headers:
          type: object
          description: Custom HTTP headers to include in every delivery request.
          additionalProperties:
            type: string
          example:
            Authorization: Bearer my-token
        basic_auth_user:
          type: string
          description: HTTP Basic Auth username. Must be set together with `basic_auth_password`.
        basic_auth_password:
          type: string
          description: HTTP Basic Auth password. Write-only — never returned in responses.
            Encrypted at rest.
    WebhookDelivery:
      type: object
      properties:
        id:
          type: integer
          description: Unique ID of the delivery record.
        event_id:
          type: string
          description: Unique ID of the source event that triggered this delivery.
        event_type:
          type: string
          description: Event type string (e.g. `referral.created`).
        action:
          type: string
          description: The CRUD action that triggered the event (e.g. `created`, `updated`,
            `deleted`).
        entity_type:
          type: string
          description: The type of entity that changed (e.g. `Referral`, `Commission`).
        entity_id:
          type: integer
          nullable: true
          description: The ID of the entity that changed.
        status:
          type: string
          enum:
          - pending
          - delivered
          - retrying
          - failed
          description: Current delivery status. `pending` — queued for delivery. `delivered`
            — endpoint responded with 2xx. `retrying` — delivery failed, waiting for
            next retry attempt. `failed` — all retry attempts exhausted.
        attempts:
          type: integer
          description: Number of delivery attempts made so far.
        last_error:
          type: string
          nullable: true
          description: Error message from the most recent failed attempt (timeout,
            connection error, non-2xx response). `null` on successful delivery.
        response_code:
          type: integer
          nullable: true
          description: HTTP status code returned by your endpoint on the last attempt.
        response_body:
          type: string
          nullable: true
          description: Response body returned by your endpoint on the last attempt
            (truncated if large).
        object_changes:
          type: object
          nullable: true
          description: For `updated` events — a map of changed fields to `[old_value,
            new_value]` pairs.
          example:
            state:
            - lead
            - customer
        payload:
          type: object
          description: The exact JSON payload that was (or will be) sent to your endpoint.
        created_at:
          type: string
          format: date-time
          description: ISO 8601 timestamp of when this delivery record was created.
        delivered_at:
          type: string
          format: date-time
          nullable: true
          description: ISO 8601 timestamp of when the delivery was acknowledged by
            your endpoint. `null` if not yet delivered.
  parameters:
    AccountId:
      name: Account-ID
      in: header
      required: true
      description: Account ID. You can find your Account ID on Your FirstPromoter
        Dashboard. Navigate to Settings → Integrations
      schema:
        type: string
tags: []
