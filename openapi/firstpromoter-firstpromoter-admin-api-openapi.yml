          - signup
          - active
          - cancelled
          - refunded
          - denied
          - pending
          - moved
        created_at:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        customer_since:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        cancelled_at:
          type: object
          properties:
            from:
              type: string
              format: date
            to:
              type: string
              format: date
        campaign_id:
          oneOf:
          - type: integer
          - type: array
            items:
              type: integer
        promoter_id:
          type: integer
        entry_source:
          type: array
          items:
            type: string
            enum:
