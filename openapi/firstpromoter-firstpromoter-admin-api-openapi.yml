                  type: array
                  description: Distribute the referral's commissions across multiple
                    promoters. Each entry specifies a split partner and the percentage
                    of every commission they receive. The primary promoter (set by
                    the top-level `promoter_campaign_id`) automatically receives the
                    remainder. The sum of all percentages must not exceed 100.
                  items:
                    type: object
                    required:
                    - promoter_campaign_id
                    - percentage
                    properties:
