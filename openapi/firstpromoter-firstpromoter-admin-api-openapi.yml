            from:
              type: string
              description: Minimum joined at date, ISO date format (YYYY-MM-DD HH:MM:SS)
              format: date
            to:
              type: string
              description: Maximum joined at date, ISO date format (YYYY-MM-DD HH:MM:SS)
              format: date
        last_login_at:
          type: object
          description: Last login at filter
          properties:
            from:
              type: string
              format: date
              description: Minimum last login at date, ISO date format (YYYY-MM-DD
                HH:MM:SS)
            to:
              type: string
              format: date
              description: Maximum last login at date, ISO date format (YYYY-MM-DD
                HH:MM:SS)
        campaign_id:
          oneOf:
          - type: integer
            description: Campaign id
          - type: array
            description: Array of campaign ids
            items:
              type: integer
        state:
          type: string
          enum:
          - pending
          - accepted
          - rejected
          - blocked
          - inactive
          - not_set
          description: Promoter state filter
        has_wform:
          type: string
          enum:
          - 'yes'
          - 'no'
          description: Has wform filter
        parent_promoter_id:
          type: integer
          description: Parent promoter id
        archived:
          type: string
          enum:
          - 'true'
          - 'false'
          - '`true`'
          - '`false`'
          - '`yes`'
          - '`no`'
          description: Archived filter
        subscribed_to_email:
          type: string
          enum:
          - 'true'
          - 'false'
          - '`true`'
          - '`false`'
          - '`yes`'
          - '`no`'
          description: Subscribed to email filter
        custom_field1:
          $ref: '#/components/schemas/CustomFieldFilter'
        custom_field2:
          $ref: '#/components/schemas/CustomFieldFilter'
        fraud_suspicions:
          type: array
          items:
            type: string
            enum:
            - same_ip_suspicion
            - same_promoter_email
            - ad_source
            - no_suspicion
            description: Suspicion type filter
        inactivity:
          type: object
          description: Filter promoters by inactivity — promoters who have not performed
            the specified metric within the given number of days
          properties:
            metric:
              type: string
              enum:
              - referral
              - customer
              - click
              - sale
              description: The activity metric to measure inactivity against
            days:
              type: integer
              minimum: 1
              description: Number of days of inactivity
        invoice_details_status:
          type: string
          enum:
          - approved
          - pending
          - rejected
          - not_submitted
          description: Filter promoters by their invoice details status
    CustomFieldFilter:
      type: object
      required:
      - key
      - operator
      - value
      properties:
        key:
          type: string
          description: The key custom_field key
        operator:
          type: string
          enum:
          - exact
          - partial
          description: The custom field operator
        value:
          oneOf:
          - type: string
          - type: array
            items:
              type: string
          description: The value of the custom field. Must be String or Array of strings
    Referral:
      type: object
      properties:
        id:
          type: integer
          description: Id of the referral
        email:
          type: string
          format: email
          description: Email address of the referral
        uid:
          type: string
          description: uid of the referral
        state:
          type: string
          enum:
          - subscribed
          - signup
          - active
          - cancelled
          - refunded
          - denied
          - pending
          - moved
          description: State of the referral
        metadata:
          type: object
          description: Additional metadata of the referral
        entry_source:
          type: string
          enum:
          - api
          - coupon
          - cookie
          - manual_admin
          - manual_affiliate
          description: "Entry source of the referral. This shows where the referral\
            \ was captured from. \n **Cookie** is set if the referral was captured\
            \ using the tid cookie, \n **Coupon** is for when the referral is captured\
            \ via a coupon code. \n**Manual admin** is for when the referral is added\
            \ manually by an admin. \n**Manual affiliate** is for when the referral\
            \ is added manually by an affiliate."
        created_at:
          type: string
          format: date-time
          description: Date and time when the referral was created
        customer_since:
          type: string
          format: date-time
          nullable: true
          description: Date and time when the referral became a customer
        promoter_campaign:
          $ref: '#/components/schemas/PromoterCampaign'
        fraud_check:
          type: string
          enum:
          - no_suspicion
          - same_ip_suspicion
          - same_promoter_email
          - ad_source
          description: Fraud check result of the referral
        created_by_user_email:
          type: string
          format: email
          nullable: true
          description: Email address of the user who created the referral
        username:
          type: string
          nullable: true
          description: Username chosen by the referral
        split_details:
          type: array
          nullable: true
          description: The commission split configuration for this referral. Each
            entry represents a split partner. The primary promoter (the referral owner)
            receives the remainder of the commission after all split percentages are
            applied.
          items:
            type: object
            properties:
              promoter_campaign_id:
                type: integer
                description: The ID of the split partner's campaign enrollment
              promoter_id:
                type: integer
                description: The ID of the split partner (promoter)
              percentage:
                type: integer
                description: The percentage of each commission this promoter receives
        first_name:
          type: string
          nullable: true
        last_name:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        comment:
          type: string
          nullable: true
          description: Internal note or comment on this referral
        is_expired:
          type: boolean
          description: Whether the referral has expired
        custom_status:
          type: object
          nullable: true
          description: Custom referral status assigned to this referral, if any
          properties:
            id:
              type: integer
            name:
              type: string
            color:
              type: string
              nullable: true
    BatchSelectionRequest:
      type: object
      properties:
        ids:
          type: array
          description: Array of selected referral ids. If there are more than __5__
            ids on this param/field, the action will be processed asynchronously.
            The response for the batch status will most likely be `in_progress`. The
            available statuses are `pending`, `in_progress`, `completed`, `failed`
            and `stopped`
          items:
            type: integer
    Filters:
      type: object
