  /company/referrals/{id}:
    get:
      summary: Get referral
      tags:
      - Referrals
      description: "Get a specific referral \n <Tip>**HTTP Request** <br/>`GET https://api.firstpromoter.com/api/v2/company/referrals/{id}`</Tip>"
      parameters:
      - $ref: '#/components/parameters/AccountId'
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: ID of the referral
      - in: query
        name: find_by
        schema:
          type: string
          enum:
          - email
          - uid
          - username
        description: Find by attribute
      responses:
        '200':
          description: Referral details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Referral'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
    put:
      summary: Update referral
      description: "Update a specific referral. The id can be a referral ID, email,\
        \ uid, or username when used with the find_by parameter in the request body.\
        \ \n <Tip>**HTTP Request** <br/>`PUT https://api.firstpromoter.com/api/v2/company/referrals/{id}`</Tip>"
      tags:
      - Referrals
      parameters:
      - $ref: '#/components/parameters/AccountId'
      - in: path
        name: id
        required: true
        schema:
          type: string
        description: ID of the referral
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  description: Email address of the referral, this is required if
                    the uid is null
                uid:
                  type: string
                  description: UID of the referral, this is required if the email
                    is null
                username:
                  type: string
                  description: "Username of the referral. \n\n **Note**: Reach out\
                    \ to us on support if you need this. It needs to be enabled before\
                    \ you can use it."
                promoter_campaign_id:
                  type: integer
                  description: Promoter campaign ID, you can obtain this for each
                    promoter from the promoters endpoint. It is the id that pairs
                    a promoter to a campaign. Not the campaign id.
                find_by:
                  type: string
                  enum:
                  - email
                  - uid
                  - username
                  description: "Find by attribute. Required when id parameter is an\
                    \ email, uid, or username instead of an ID.\n\n Your request should\
                    \ follow the format `https://api.firstpromoter.com/api/v2/company/referrals/{email\
                    \ or uid or username}`"
                split_details:
                  type: array
                  description: Update the commission split for this referral. Pass
                    an array of split partners and their percentages to add or replace
                    splits. Pass an empty array (`[]`) to remove all splits. The primary
                    promoter automatically receives the remainder of the commission
                    after all split percentages are applied. The sum of all percentages
                    must not exceed 100.
                  items:
                    type: object
                    required:
                    - promoter_campaign_id
                    - percentage
                    properties:
                      promoter_campaign_id:
                        type: integer
                        description: The ID of the split partner's campaign enrollment
                          (`promoter_campaign.id`). This is the ID that links a specific
                          promoter to a specific campaign — not the campaign ID itself.
                      percentage:
                        type: integer
                        description: The percentage of each commission this promoter
                          receives. Must be between 0 and 100. The sum across all
                          split entries must not exceed 100.
                  example:
                  - promoter_campaign_id: 1002
                    percentage: 25
                  - promoter_campaign_id: 1003
                    percentage: 30
      responses:
        '200':
          description: Referral updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Referral'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not found
